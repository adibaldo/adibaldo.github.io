name: Render Pattern Over Stuff Video

on:
  push:
    branches: [main]
    paths:
      - 'remotion/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install dependencies
        working-directory: remotion
        run: npm ci

      - name: Install Chrome for Remotion
        working-directory: remotion
        run: npx remotion browser ensure

      - name: Render video
        working-directory: remotion
        run: npx remotion render src/index.ts PatternOverStuff out.mp4
        env:
          REMOTION_CHROME_FLAGS: "--no-sandbox"

      - name: Move video to public folder
        run: mv remotion/out.mp4 public/videos/pattern-over-stuff.mp4

      - name: Commit rendered video
        run: |
          git config user.name "Cinelasta [bot]"
          git config user.email "franklinbaldo@users.noreply.github.com"
          git add public/videos/pattern-over-stuff.mp4
          git diff --cached --quiet || git commit -m "chore(cinelasta): render Pattern Over Stuff video [skip ci]"
          git push
